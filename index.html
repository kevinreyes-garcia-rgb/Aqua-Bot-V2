<script>
/* --------------------
   AUDIO (WebAudio)
   -------------------- */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio(){ if(!audioCtx) audioCtx = new AudioCtx(); }
function playBeep(type='sine', freq=720, dur=0.06, gain=0.05){
  try{
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(gain, audioCtx.currentTime);
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.stop(audioCtx.currentTime + dur + 0.02);
  }catch(e){}
}
function playSequence(seq){
  try{
    ensureAudio();
    let t = audioCtx.currentTime;
    seq.forEach(s=>{
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = s.type||'sine';
      o.frequency.value = s.freq;
      g.gain.setValueAtTime(s.gain||0.05, t + (s.delay||0));
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t + (s.delay||0));
      o.stop(t + (s.delay||0) + (s.dur||0.08));
    });
  }catch(e){}
}

/* --------------------
   HELPERS
   -------------------- */
const messages = document.getElementById('messages');
function appendBubble(html, className='bot'){
  const d=document.createElement('div');
  d.className='bubble '+className;
  d.innerHTML=html;
  messages.appendChild(d);
  setTimeout(()=> messages.scrollTo({top: messages.scrollHeight, behavior:'smooth'}), 60);
  return d;
}
function appendLoading(text="Cargando..."){ return appendBubble(`<div class="proc"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div style="margin-left:6px">${text}</div></div>`,'bot'); }
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* safe fetch that returns parsed JSON when possible */
async function safeFetch(url, opts){
  const r = await fetch(url, opts);
  const text = await r.text();
  try{ return JSON.parse(text); }catch{ return {raw:text}; }
}

appendBubble('👋 <b>Hola — soy Aqua</b><br>Usa <b>.menu</b> para ver comandos.');

    img.style.transform = 'scale(.98)';
    setTimeout(()=> img.style.transform = 'scale(1)', 80);
    img.animate([{boxShadow:'0 10px 30px rgba(0,170,255,0.65)'},{boxShadow:'0 18px 44px rgba(0,170,255,0.85)'}],{duration:900,iterations:1,fill:'forwards'});

/* --------------------
   IMAGE / VIDEO DISPLAY HELPERS
   -------------------- */
function showImage(url){
  const el = appendBubble(`<img src="${url}" class="msg-img">`,'bot');
  const img = el.querySelector('img');
  img.addEventListener('load', ()=>{
    el.classList.add('media-focus');
    setTimeout(()=> el.classList.remove('media-focus'), 1600);
    playSequence([{freq:780,dur:0.08,delay:0},{freq:920,dur:0.06,delay:0.06}]);
  });
}
function showVideo(url){
  const el = appendBubble(`<video controls class="msg-img"><source src="${url}" type="video/mp4"></video>`,'bot');
  const v = el.querySelector('video');
  v.addEventListener('loadeddata', ()=>{
    el.classList.add('media-focus');
    setTimeout(()=> el.classList.remove('media-focus'), 1500);
    playBeep('sine', 680, 0.06, 0.05);
  });
}

async function cmd_tiktok(raw){

  try{
    const d = await safeFetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
    if(loading.parentNode) loading.parentNode.removeChild(loading);
    const play = (d && d.data && (d.data.play || d.data.play_addr)) || d.play || d.data?.play;
    if(play) showVideo(play); else appendBubble("❌ No se encontró el video.",'bot');
  }catch(e){ if(loading.parentNode) loading.parentNode.removeChild(loading); appendBubble("❌ Error TikTok.",'bot'); }

async function cmd_translate(raw){
  const payload = raw.replace(/^\.traslate\s*/i,"").trim();
  if(!payload.includes("|")) return appendBubble("⚠️ Usa: .traslate texto | idioma",'bot');
  const [text, lang] = payload.split("|").map(x=>x.trim());
  const loading = appendLoading(`🌐 Traduciendo a ${lang}...`);
  try{
    const d = await safeFetch("https://api.dorratz.com/v3/translate",{
      method:"POST",

}

/* --------------------
   DISPATCH & UI
   -------------------- */
const input=document.getElementById('input');
const sendBtn=document.getElementById('sendBtn');
sendBtn.addEventListener('click', send);
input.addEventListener('keydown', e=>{ if(e.key==="Enter") send(); });

function appendUser(text){
  playBeep('sine',620,0.04,0.06);
  appendBubble(escapeHtml(text),'user');
}

function send(){
  const text=input.value.trim();
  if(!text) return;
  appendUser(text);
  input.value="";
  const cmd=text.split(" ")[0].toLowerCase();

  // process heavy visual indicator for heavy commands
  const heavy = ['.ia','.g','.G','.yt','.t','.tiktok'];
  if(heavy.includes(cmd)){
    const proc = appendBubble(`<div class="proc">⚙️ <span style="font-weight:700;margin-left:8px">Procesando</span></div>`,'bot');
    setTimeout(()=> { if(proc.parentNode) proc.parentNode.removeChild(proc); }, 1100);
  }

  if(cmd==='.menu') return cmd_menu();
  if(cmd==='.girl') return cmd_girl();
  if(cmd==='.waifu') return cmd_waifu();
  if(cmd==='.img'){
    if(/waifu/i.test(text)) return cmd_img_waifu();
    if(/random/i.test(text)) return cmd_img_random();
    return appendBubble("❌ Usa .img waifu / .img random",'bot');
  }
  if(cmd==='.play' && /random/i.test(text)) return cmd_play_random();
  if(cmd==='.tiktok') return cmd_tiktok(text);
  if(cmd==='.t') return cmd_t(text);
  if(cmd==='.yt') return cmd_yt(text);
  if(cmd==='.g' || cmd==='.G') return cmd_G(text);
  if(cmd==='.ia') return cmd_ia(text);
  if(cmd==='.traslate') return cmd_translate(text);

  appendBubble("❌ Comando no reconocido.", 'bot');
}

/* --------------------
   IMAGE/VIDEO OVERLAY
   -------------------- */
document.addEventListener('click', (e)=>{
  if(e.target.tagName === 'IMG' && e.target.classList.contains('msg-img')){
    showOverlayMedia('img', e.target.src);
  }
  if(e.target.tagName === 'VIDEO' && e.target.classList.contains('msg-img')){
    showOverlayMedia('video', e.target.currentSrc || e.target.querySelector('source')?.src);
  }
});

function showOverlayMedia(type, src){
  const o = document.createElement('div');
  o.style.position = 'fixed';
  o.style.inset = 0;
  o.style.background = 'rgba(8,12,18,0.72)';
  o.style.display = 'flex';
  o.style.alignItems = 'center';
  o.style.justifyContent = 'center';
  o.style.zIndex = 9999;
  o.style.cursor = 'zoom-out';
  o.style.backdropFilter = 'blur(6px)';
  o.addEventListener('click', ()=> document.body.removeChild(o));
  if(type==='img'){
    const img = document.createElement('img');
    img.src = src;
    img.style.maxWidth = '92%';
    img.style.maxHeight = '86%';
    img.style.borderRadius = '14px';
    img.style.boxShadow = '0 40px 80px rgba(0,0,0,0.6)';
    o.appendChild(img);
    document.body.appendChild(o);
    requestAnimationFrame(()=> img.style.transform = 'scale(1)');
  }else{
    const v = document.createElement('video');
    v.src = src;
    v.controls = true;
    v.autoplay = true;
    v.style.maxWidth = '92%';
    v.style.maxHeight = '86%';
    v.style.borderRadius = '12px';
    v.style.boxShadow = '0 36px 72px rgba(0,0,0,0.6)';
    o.appendChild(v);
    document.body.appendChild(o);
  }
}

/* unlock audio */
function unlockAudio(){
  try{ playSequence([{freq:420,dur:0.04,delay:0},{freq:540,dur:0.05,delay:0.06}]); window.removeEventListener('click', unlockAudio); }catch(e){}
}
window.addEventListener('click', unlockAudio);

/* accessibility */
messages.tabIndex = 0;
